<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Form Validator</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f172a;
    font-family:Arial;
}

.container{
    width:350px;
    background:#1e293b;
    padding:25px;
    border-radius:18px;
    text-align:center;
    color:white;
}

input{
    width:100%;
    padding:12px;
    margin-top:12px;
    border:none;
    border-radius:10px;
    outline:none;
    font-size:15px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#22c55e;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

#error{
    margin-top:15px;
    color:#f87171;
}

#success{
    margin-top:15px;
    color:#4ade80;
}

</style>
</head>

<body>

<div class="container">

    <h2>Login</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">
        Login
    </button>

    <div id="msg"></div>

</div>

<script>

function login(){

    let username =
    document.getElementById("username").value;

    let password =
    document.getElementById("password").value;

    let msg =
    document.getElementById("msg");

    if(username.length < 3){
        msg.innerHTML = "Username juda qisqa!";
        msg.style.color = "#f87171";
        return;
    }

    if(password.length < 5){
        msg.innerHTML = "Password juda qisqa!";
        msg.style.color = "#f87171";
        return;
    }

    msg.innerHTML = "Login successful!";
    msg.style.color = "#4ade80";
}

</script>

</body>
</html>
